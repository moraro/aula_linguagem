<!DOCTYPE html>
<html lang="pt-br">
<head>
  <!-- Configuração de caracteres -->
  <meta charset="UTF-8">

  <!-- Responsividade -->
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Título -->
  <title>FaTech Manager - Listagem</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Ícones -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

  <style>
    /* Fonte padrão */
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    /* Efeito hover na tabela */
    .table-hover tbody tr:hover {
      background-color: #f8f9fa;
    }
  </style>
</head>

<body>

  <!-- NAVBAR -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand fw-bold" href="index_comentado.html">
        <i class="bi bi-cpu"></i> FaTech Manager
      </a>

      <!-- Menu responsivo -->
      <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#menu">
        <span class="navbar-toggler-icon"></span>
      </button>

      <!-- Links -->
      <div class="collapse navbar-collapse" id="menu">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="index_comentado.html">Início</a></li>
          <li class="nav-item"><a class="nav-link" href="cadastro_comentado.html">Cadastros</a></li>
          <li class="nav-item"><a class="nav-link active" href="listagem_comentado.html">Listagem</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- CONTEÚDO -->
  <section class="container my-5">
    <h2 class="text-center mb-4 fw-bold">Listagem de Clientes</h2>

    <!-- Botões -->
    <div class="text-end mb-3">
      <button class="btn btn-outline-primary btn-sm" id="btnRecarregar">Recarregar</button>
      <button class="btn btn-outline-danger btn-sm" id="btnLimpar">Limpar Todos</button>
    </div>

    <!-- Tabela -->
    <table class="table table-striped table-hover" id="tabelaClientes">
      <thead>
        <tr>
          <th>#</th>
          <th>Nome</th>
          <th>Email</th>
          <th>Telefone</th>
          <th>Setor</th>
          <th>Obs</th>
          <th>Ações</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>

    <!-- Alerta -->
    <div class="alert alert-warning d-none" id="alertaVazio">
      Nenhum cliente cadastrado.
    </div>
  </section>

  <!-- MODAL DE EDIÇÃO -->
  <div class="modal fade" id="modalEditar">
    <div class="modal-dialog">
      <div class="modal-content">

        <!-- Cabeçalho -->
        <div class="modal-header bg-warning">
          <h5>Editar Cliente</h5>
        </div>

        <!-- Corpo -->
        <div class="modal-body">
          <input id="editNome" class="form-control mb-2">
          <input id="editEmail" class="form-control mb-2">
          <input id="editTelefone" class="form-control mb-2">
          <select id="editSetor" class="form-select mb-2">
            <option>Comercial</option>
            <option>Financeiro</option>
            <option>Técnico</option>
            <option>Suporte</option>
          </select>
          <textarea id="editObs" class="form-control"></textarea>
        </div>

        <!-- Rodapé -->
        <div class="modal-footer">
          <button class="btn btn-warning" id="btnSalvarEdicao">Salvar</button>
        </div>

      </div>
    </div>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    // ============================
    // VARIÁVEL GLOBAL
    // ============================
    // Guarda o índice do cliente que está sendo editado
    let clienteEditando = null;


    // ============================
    // FUNÇÃO: CARREGAR CLIENTES
    // ============================
    // Lê os dados do localStorage e monta a tabela na tela
    function carregarClientes() {

      const tabela = document.querySelector('#tabelaClientes tbody');
      const alerta = document.getElementById('alertaVazio');

      // Limpa tabela antes de recarregar
      tabela.innerHTML = '';

      // Recupera dados do navegador
      const clientes = JSON.parse(localStorage.getItem('clientes')) || [];

      // Se não houver clientes
      if (clientes.length === 0) {
        alerta.classList.remove('d-none'); // mostra alerta
        return;
      }

      alerta.classList.add('d-none');

      // Percorre lista de clientes
      clientes.forEach((cliente, index) => {

        // Cria linha da tabela dinamicamente
        const linha = `
          <tr>
            <td>${index + 1}</td>
            <td>${cliente.nome}</td>
            <td>${cliente.email}</td>
            <td>${cliente.telefone}</td>
            <td>${cliente.setor}</td>
            <td>${cliente.observacoes || '-'}</td>
            <td>
              <button onclick="editarCliente(${index})">Editar</button>
              <button onclick="excluirCliente(${index})">Excluir</button>
            </td>
          </tr>
        `;

        // Insere no HTML
        tabela.insertAdjacentHTML('beforeend', linha);
      });
    }


    // ============================
    // FUNÇÃO: EXCLUIR CLIENTE
    // ============================
    function excluirCliente(index) {

      // Confirmação do usuário
      if (confirm('Deseja excluir?')) {

        // Recupera lista
        const clientes = JSON.parse(localStorage.getItem('clientes')) || [];

        // Remove cliente pelo índice
        clientes.splice(index, 1);

        // Atualiza storage
        localStorage.setItem('clientes', JSON.stringify(clientes));

        // Recarrega tabela
        carregarClientes();
      }
    }


    // ============================
    // FUNÇÃO: EDITAR CLIENTE
    // ============================
    function editarCliente(index) {

      // Guarda índice atual
      clienteEditando = index;

      const clientes = JSON.parse(localStorage.getItem('clientes')) || [];
      const cliente = clientes[index];

      // Preenche campos do modal
      document.getElementById("editNome").value = cliente.nome;
      document.getElementById("editEmail").value = cliente.email;
      document.getElementById("editTelefone").value = cliente.telefone;
      document.getElementById("editSetor").value = cliente.setor;
      document.getElementById("editObs").value = cliente.observacoes;

      // Abre modal
      const modal = new bootstrap.Modal(document.getElementById('modalEditar'));
      modal.show();
    }


    // ============================
    // EVENTO: SALVAR EDIÇÃO
    // ============================
    document.getElementById("btnSalvarEdicao").addEventListener("click", () => {

      const clientes = JSON.parse(localStorage.getItem('clientes')) || [];

      // Atualiza dados do cliente editado
      clientes[clienteEditando] = {
        nome: document.getElementById("editNome").value,
        email: document.getElementById("editEmail").value,
        telefone: document.getElementById("editTelefone").value,
        setor: document.getElementById("editSetor").value,
        observacoes: document.getElementById("editObs").value
      };

      // Salva novamente
      localStorage.setItem("clientes", JSON.stringify(clientes));

      // Atualiza tabela
      carregarClientes();

      // Fecha modal
      bootstrap.Modal.getInstance(document.getElementById('modalEditar')).hide();
    });


    // ============================
    // BOTÕES EXTRAS
    // ============================

    // Recarregar lista manualmente
    document.getElementById('btnRecarregar')
      .addEventListener('click', carregarClientes);

    // Limpar todos os dados
    document.getElementById('btnLimpar')
      .addEventListener('click', () => {

        if (confirm('Apagar tudo?')) {
          localStorage.removeItem('clientes');
          carregarClientes();
        }
      });


    // ============================
    // INICIALIZAÇÃO
    // ============================
    // Executa ao carregar a página
    window.onload = carregarClientes;

  </script>

</body>
</html>
